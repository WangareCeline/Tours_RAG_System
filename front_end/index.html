<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tours Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Tours Assistant</h1>
            <p>RAG-Powered Insights</p>
        </header>
        
        <div id="chat-window" class="chat-window">
            <div class="message assistant">Hello! What do you want to know?</div>
        </div>

        <div id="loading" class="hidden">Assistant is searching...</div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask about flights, hotels, or sights...">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
